<svg width="200" height="64" viewBox="0 0 200 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Ground shadow -->
  <ellipse cx="100" cy="60" rx="78" ry="6" fill="rgba(0,0,0,0.18)" />

  <!-- Front wood frame -->
  <rect x="6" y="38" width="188" height="18" rx="4" fill="#9a6b3f"/>

  <!-- Metal panel (front face) -->
  <rect x="18" y="40" width="164" height="14" rx="2" fill="#bfc6cc"/>

  <!-- Metal ridges -->
  <g fill="#aeb6bc">
    <rect x="20" y="42" width="6" height="10"/>
    <rect x="34" y="42" width="6" height="10"/>
    <rect x="48" y="42" width="6" height="10"/>
    <rect x="62" y="42" width="6" height="10"/>
    <rect x="76" y="42" width="6" height="10"/>
    <rect x="90" y="42" width="6" height="10"/>
    <rect x="104" y="42" width="6" height="10"/>
    <rect x="118" y="42" width="6" height="10"/>
    <rect x="132" y="42" width="6" height="10"/>
    <rect x="146" y="42" width="6" height="10"/>
    <rect x="160" y="42" width="6" height="10"/>
  </g>

  <!-- Top wood frame -->
  <rect x="0" y="0" width="200" height="40" rx="6" fill="#b07a46"/>

  <!-- Inner soil -->
  <rect x="16" y="10" width="168" height="18" rx="4" fill="#6b4f3f"/>

  <!-- Wood grain highlight -->
  <rect x="0" y="0" width="200" height="40" rx="6"
        fill="none" stroke="rgba(255,255,255,0.25)" />
</svg>
