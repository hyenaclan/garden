<svg
  width="64"
  height="200"
  viewBox="0 0 64 200"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Ground shadow -->
  <ellipse
    cx="32"
    cy="194"
    rx="20"
    ry="6"
    fill="rgba(0,0,0,0.18)"
  />

  <!-- Front wood frame (south face) -->
  <rect
    x="4"
    y="160"
    width="56"
    height="28"
    rx="4"
    fill="#9a6b3f"
  />

  <!-- Metal panel (front face) -->
  <rect
    x="10"
    y="164"
    width="44"
    height="18"
    rx="2"
    fill="#bfc6cc"
  />

  <!-- Metal ridges (horizontal, since front face is south) -->
  <g fill="#aeb6bc">
    <rect x="12" y="166" width="40" height="2"/>
    <rect x="12" y="170" width="40" height="2"/>
    <rect x="12" y="174" width="40" height="2"/>
    <rect x="12" y="178" width="40" height="2"/>
  </g>

  <!-- Top wood frame -->
  <rect
    x="0"
    y="0"
    width="64"
    height="160"
    rx="6"
    fill="#b07a46"
  />

  <!-- Inner soil -->
  <rect
    x="10"
    y="14"
    width="44"
    height="120"
    rx="4"
    fill="#6b4f3f"
  />

  <!-- Wood rim highlight -->
  <rect
    x="0"
    y="0"
    width="64"
    height="160"
    rx="6"
    fill="none"
    stroke="rgba(255,255,255,0.25)"
  />
</svg>
